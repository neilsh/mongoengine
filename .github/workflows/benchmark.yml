name: "Benchmark"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  benchmark:
    name: Run benchmark
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        mongodb-version: ['7.0']
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: ${{ matrix.mongodb-version }}
      - name: Install Dependencies
        run: |
          pip install -e '.[test]'
      - name: Run benchmark (CPU-based timer)
        run: |
          pytest -x -v --benchmark-json output-${{ matrix.python-version }}-${{ matrix.mongodb-version }}.json --benchmark-timer=time.process_time benchmarks/
      - name: Store benchmark result
        uses: rhysd/github-action-benchmark@v1
        with:
          name: Pytest Benchmark (python ${{ matrix.python-version }} x mongo ${{ matrix.mongodb-version }})
          tool: 'pytest'
          output-file-path: output-${{ matrix.python-version }}-${{ matrix.mongodb-version }}.json
          benchmark-data-dir-path: 'dev/bench'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
