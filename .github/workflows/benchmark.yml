name: "Benchmark"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  run-benchmark:
    name: Run benchmark (python ${{ matrix.python-version }} x mongo ${{ matrix.mongodb-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
        mongodb-version: ['7.0']
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: ${{ matrix.mongodb-version }}
      - name: Install Dependencies
        run: |
          pip install -e '.[test]'
      - name: Run benchmark (CPU-based timer)
        run: >
          pytest -x -v
          --benchmark-json output-${{ matrix.python-version }}-${{ matrix.mongodb-version }}.json
          --benchmark-timer=time.process_time
          benchmarks/
      - name: Upload benchmark result
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-result-${{ matrix.python-version }}-${{ matrix.mongodb-version }}
          path: output-${{ matrix.python-version }}-${{ matrix.mongodb-version }}.json

  collect-benchmarks:
    name: Collect and publish benchmarks
    runs-on: ubuntu-latest
    needs: run-benchmark
    steps:
      - uses: actions/checkout@v4
      - name: Download benchmark results
        uses: actions/download-artifact@v3
        with:
          path: benchmark-results
      - name: Combine benchmark results
        run: |
          import json
          import glob
          import os

          all_benchmarks = []
          template_data = None
          artifact_dirs = glob.glob('benchmark-results/benchmark-result-*')

          for artifact_dir in artifact_dirs:
              fname = os.path.basename(artifact_dir)
              parts = fname.replace('benchmark-result-', '').split('-')
              py_ver, mongo_ver = parts[0], parts[1]
              suffix = f" (py{py_ver}, mongo{mongo_ver})"
              
              json_file_path = glob.glob(os.path.join(artifact_dir, '*.json'))[0]

              with open(json_file_path, 'r') as f:
                  data = json.load(f)
                  if template_data is None:
                      template_data = data.copy()
                      template_data['benchmarks'] = []
                  
                  for bench in data['benchmarks']:
                      bench['name'] += suffix
                      all_benchmarks.append(bench)

          all_benchmarks.sort(key=lambda x: x['name'])
          template_data['benchmarks'] = all_benchmarks

          with open('output.json', 'w') as f:
              json.dump(template_data, f)
        shell: python
      - name: Store benchmark result
        uses: rhysd/github-action-benchmark@v1
        with:
          name: Pytest Benchmark
          tool: 'pytest'
          output-file-path: output.json
          benchmark-data-dir-path: 'dev/bench'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
